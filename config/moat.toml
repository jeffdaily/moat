# Orchestration knobs for utils/orient.sh and the agents.

[pipeline]
max_inflight_build = 1     # heavy build/test stages at once per host (single GPU)
lookahead_planners = 1     # plan the next project while the current one ports

[claims]
claim_ttl_minutes = 30     # a claim with no heartbeat past this is reclaimable
heartbeat_seconds = 120    # how often the working CLI refreshes its claim

[porter]
max_attempts = 3           # failed validation cycles before blocking and asking
